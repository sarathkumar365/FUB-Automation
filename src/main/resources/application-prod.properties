# Prod-profile overrides for hosted dev environment.
# Activated by SPRING_PROFILES_ACTIVE=prod (see scripts/run-app.sh prod).
#
# Sources of truth:
# - Docs/features/dev-hosting-security-hardening/plan.md
# - Docs/hosting-decision/dev/dev-hosting-security-checklist.md  (items A3, A7)

# A3 — Tomcat body-size cap. Outer wall that rejects oversized requests
# before Spring buffers the full body into memory. The per-source in-app
# cap (e.g. webhook.max-body-bytes, default 1MB) remains as the inner wall.
# Known gap (documented): @RequestBody String for application/json is not
# strictly bounded by these properties; max-swallow-size is what protects
# the JVM from runaway buffering. A streaming counting filter is over-scope
# for the dev environment.
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.max-file-size=10MB

# A7 — Disable JPA SQL logging in deployed environments. FUB payloads
# carry PII and the platform's log dashboard is not an appropriate sink.
# Local development keeps show-sql=true via the base application.properties.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Hardcoded call → task automation is being retired in favour of the
# workflow engine. Turn it off in deployed environments so no FUB tasks
# are created until the workflow-based replacement is built.
# See Docs/features/disable-hardcoded-task-creation/.
rules.call-outcome.task-creation-enabled=false

# JPA hygiene. Open-Session-In-View defaults to true and triggers a
# warning; turning it off in prod scopes DB sessions to the service
# layer where they belong.
spring.jpa.open-in-view=false

# Error-response hygiene. Don't leak stacktraces or framework error
# messages to the wire. Local dev keeps the Spring defaults so
# debugging stays painless.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# DevTools is `runtime+optional` in pom.xml and excluded from the
# packaged jar (verified A6). Belt-and-suspenders: pin LiveReload off
# so even if devtools sneaks onto the classpath in some future build,
# its server doesn't start.
spring.devtools.livereload.enabled=false
spring.devtools.restart.enabled=false
