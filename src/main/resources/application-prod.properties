# Prod-profile overrides for hosted dev environment.
# Activated by SPRING_PROFILES_ACTIVE=prod (see scripts/run-app.sh prod).
#
# Sources of truth:
# - Docs/features/dev-hosting-security-hardening/plan.md
# - Docs/hosting-decision/dev/dev-hosting-security-checklist.md  (items A3, A7)

# A3 — Tomcat body-size cap. Outer wall that rejects oversized requests
# before Spring buffers the full body into memory. The per-source in-app
# cap (e.g. webhook.max-body-bytes, default 1MB) remains as the inner wall.
# Known gap (documented): @RequestBody String for application/json is not
# strictly bounded by these properties; max-swallow-size is what protects
# the JVM from runaway buffering. A streaming counting filter is over-scope
# for the dev environment.
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.max-file-size=10MB

# A7 — Disable JPA SQL logging in deployed environments. FUB payloads
# carry PII and the platform's log dashboard is not an appropriate sink.
# Local development keeps show-sql=true via the base application.properties.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
