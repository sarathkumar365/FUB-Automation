spring.application.name=automation-engine

#  DB Configuration for PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/automation_engine}
spring.datasource.username=${DB_USER:sarathkumar}
spring.datasource.password=${DB_PASS:sarathkumar}

spring.datasource.driver-class-name=org.postgresql.Driver

 # JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.hikari.maximum-pool-size=5

# Webhook foundation
webhook.max-body-bytes=${WEBHOOK_MAX_BODY_BYTES:1048576}
webhook.sources.fub.enabled=${WEBHOOK_FUB_ENABLED:true}
webhook.sources.fub.signing-key=${FUB_X_SYSTEM_KEY:}
webhook.live-feed.heartbeat-seconds=${WEBHOOK_LIVE_FEED_HEARTBEAT_SECONDS:15}
webhook.live-feed.emitter-timeout-ms=${WEBHOOK_LIVE_FEED_EMITTER_TIMEOUT_MS:1800000}

# Follow Up Boss outbound client
fub.base-url=${FUB_BASE_URL:}
fub.api-key=${FUB_API_KEY:}
fub.x-system=${FUB_X_SYSTEM:}
fub.x-system-key=${FUB_X_SYSTEM_KEY:}
fub.retry.max-attempts=${FUB_RETRY_MAX_ATTEMPTS:3}
fub.retry.initial-delay-ms=${FUB_RETRY_INITIAL_DELAY_MS:500}
fub.retry.max-delay-ms=${FUB_RETRY_MAX_DELAY_MS:5000}
fub.retry.multiplier=${FUB_RETRY_MULTIPLIER:2.0}
fub.retry.jitter-factor=${FUB_RETRY_JITTER_FACTOR:0.2}

# Step 4 call outcome rules
rules.call-outcome.short-call-threshold-seconds=${SHORT_CALL_THRESHOLD_SECONDS:30}
rules.call-outcome.task-due-in-days=${TASK_DUE_IN_DAYS:1}
rules.call-outcome.dev-test-user-id=${DEV_TEST_USER_ID:0}

# Workflow engine worker (Wave 1)
workflow.worker.enabled=${WORKFLOW_WORKER_ENABLED:true}
workflow.worker.poll-interval-ms=${WORKFLOW_WORKER_POLL_INTERVAL_MS:2000}
workflow.worker.claim-batch-size=${WORKFLOW_WORKER_CLAIM_BATCH_SIZE:50}
workflow.worker.max-steps-per-poll=${WORKFLOW_WORKER_MAX_STEPS_PER_POLL:200}
workflow.worker.stale-processing-enabled=${WORKFLOW_WORKER_STALE_PROCESSING_ENABLED:true}
workflow.worker.stale-processing-timeout-minutes=${WORKFLOW_WORKER_STALE_PROCESSING_TIMEOUT_MINUTES:15}
workflow.worker.stale-processing-requeue-limit=${WORKFLOW_WORKER_STALE_PROCESSING_REQUEUE_LIMIT:1}
workflow.worker.stale-processing-batch-size=${WORKFLOW_WORKER_STALE_PROCESSING_BATCH_SIZE:50}

# Workflow trigger router (Wave 3 Phase 2)
workflow.trigger-router.max-fanout-per-event=${WORKFLOW_TRIGGER_ROUTER_MAX_FANOUT_PER_EVENT:200}

# Workflow HTTP step client (Wave 3 Phase 3)
workflow.step-http.connect-timeout-ms=${WORKFLOW_STEP_HTTP_CONNECT_TIMEOUT_MS:3000}
workflow.step-http.read-timeout-ms=${WORKFLOW_STEP_HTTP_READ_TIMEOUT_MS:5000}

# AI call service client (Phase 2)
ai-call-service.base-url=${AI_CALL_SERVICE_BASE_URL:http://localhost:8081}
ai-call-service.connect-timeout-ms=${AI_CALL_SERVICE_CONNECT_TIMEOUT_MS:3000}
ai-call-service.read-timeout-ms=${AI_CALL_SERVICE_READ_TIMEOUT_MS:5000}
ai-call-service.local-safe-to-number=${AI_CALL_SERVICE_LOCAL_SAFE_TO_NUMBER:}
