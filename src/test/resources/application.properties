spring.datasource.url=jdbc:h2:mem:automation_engine_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false

webhook.max-body-bytes=1048576
webhook.sources.fub.enabled=true
webhook.sources.fub.signing-key=test-signing-key
webhook.live-feed.heartbeat-seconds=15
webhook.live-feed.emitter-timeout-ms=60000
fub.base-url=http://localhost:18080/v1
fub.api-key=test-api-key
fub.x-system=test-system
fub.x-system-key=test-system-key
fub.retry.max-attempts=3
fub.retry.initial-delay-ms=1
fub.retry.max-delay-ms=1
fub.retry.multiplier=2.0
fub.retry.jitter-factor=0.0
rules.call-outcome.dev-test-user-id=0
